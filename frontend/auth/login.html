<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Sign in · SkillForge</title>
<meta name="description" content="SkillForge — AI-powered gamified learning platform. Level up your learning journey."/>
<link rel="stylesheet" href="../shared/css/global.css"/>
<link rel="stylesheet" href="css/auth.css"/>
</head>
<body class="auth">

<a href="../landing/index.html" class="back-home">← Back to home</a>
<div class="auth-wrap">
  <div class="auth-card">
    <div class="brand"><div class="logo">⚡</div><span>SkillForge</span></div>
    <h1>Welcome back</h1>
    <p class="sub">Sign in to continue your learning journey</p>
    <form>
      <div class="role-row">
        <label><input type="radio" name="role" value="learner" checked/><div class="pill">Learner</div></label>
        <label><input type="radio" name="role" value="instructor"/><div class="pill">Instructor</div></label>
        <label><input type="radio" name="role" value="admin"/><div class="pill">Admin</div></label>
      </div>
      <div><label class="label">Email</label><input id="login-email" class="input" type="email" placeholder="you@example.com" required/></div>
      <div><label class="label">Password</label><input id="login-password" class="input" type="password" placeholder="••••••••" required/></div>
      <div class="row-between"><label style="display:flex;gap:8px;align-items:center"><input type="checkbox"/> Remember me</label><a href="forgot_password.html">Forgot password?</a></div>
      <button class="btn btn-primary" style="justify-content:center;margin-top:6px">Sign In</button>
      <div class="divider">or continue with</div>
      <div class="oauth"><button>🔵 Google</button><button> Apple</button></div>
    </form>
    <p class="foot">Don't have an account? <a href="signup.html">Create one</a></p>
  </div>
</div>

<script src="../shared/js/global.js"></script>
<script src="../shared/js/helpers.js"></script>
<script src="js/auth.js"></script>

</body>
</html>
